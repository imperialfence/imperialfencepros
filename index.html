<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imperial Fence Pros</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6f9;
}

/* HEADER */
header {
    display: flex;
    align-items: center;
    padding: 15px 30px;
    background: #0a2a66;
    color: white;
    position: fixed;
    width: 100%;
    z-index: 10;
    gap: 15px;
}

header img {
    height: 60px;
}

header h2 {
    font-size: 28px;
    margin: 0;
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(rgba(10,42,102,0.7), rgba(10,42,102,0.7)),
                url('images/hero.jpg') center/cover no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
}

.hero h1 {
    font-size: 3.2rem;
}

.hero p {
    font-size: 1.3rem;
}

/* BUTTON */
.btn {
    margin-top: 15px;
    padding: 14px 30px;
    background: #3d5fa8;
    border-radius: 30px;
    color: white;
    text-decoration: none;
    font-weight: bold;
    display: inline-block;
}

/* SECTION */
.section {
    padding: 80px 20px;
    text-align: center;
}

/* SERVICES */
.services {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 30px;
}

.card {
    width: 300px;
    border-radius: 15px;
    overflow: hidden;
    background: white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
}

.gallery img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 12px;
    cursor: pointer;
}

/* LIGHTBOX */
.lightbox {
    display: none;
    position: fixed;
    z-index: 999;
    background: rgba(0,0,0,0.9);
    width: 100%;
    height: 100%;
}

.lightbox img {
    display: block;
    margin: 5% auto;
    max-width: 90%;
}

.lightbox span {
    position: absolute;
    top: 20px;
    right: 40px;
    color: white;
    font-size: 40px;
    cursor: pointer;
}

/* SIDE QUOTE BUTTON */
.quote-tab {
    position: fixed;
    left: 0;
    top: 40%;
    background: #0a2a66;
    color: white;
    padding: 15px;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    cursor: pointer;
    z-index: 1000;
}

/* POPUP FORM */
.quote-popup {
    position: fixed;
    left: -350px;
    top: 0;
    width: 350px;
    height: 100%;
    background: white;
    box-shadow: 5px 0 15px rgba(0,0,0,0.3);
    padding: 20px;
    transition: 0.3s;
    z-index: 1001;
}

.quote-popup.active {
    left: 0;
}

.quote-popup input,
.quote-popup textarea {
    width: 90%;
    padding: 10px;
    margin-bottom: 10px;
}

/* FLOATING CALL BUTTON (MOVED UP) */
.call-btn {
    position: fixed;
    bottom: 90px;
    right: 20px;
    background: #0a2a66;
    color: white;
    padding: 15px 20px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: bold;
    z-index: 1000;
}

/* FOOTER */
footer {
    background: #111;
    color: white;
    padding: 20px;
}
</style>
</head>

<body>

<header>
    <img src="images/logo.png">
    <h2>Imperial Fence Pros</h2>
</header>

<section class="hero">
    <div>
        <h1>Premium Fencing That Lasts</h1>
        <p>Licensed & Insured | Residential & Commercial</p>
        <a href="tel:13213458559" class="btn">Call Now</a>
    </div>
</section>

<section class="section">
    <h2>Our Services</h2>
    <div class="services">
        <div class="card"><img src="images/wood.jpg"><h3>Wood</h3></div>
        <div class="card"><img src="images/vinyl.jpg"><h3>Vinyl</h3></div>
        <div class="card"><img src="images/aluminum.jpg"><h3>Aluminum</h3></div>
    </div>
</section>

<section class="section">
    <h2>Our Work</h2>
    <div class="gallery">
        <img src="images/project1.jpg" onclick="openLightbox(this)">
        <img src="images/project2.jpg" onclick="openLightbox(this)">
        <img src="images/project3.jpg" onclick="openLightbox(this)">
    </div>
</section>

<div id="lightbox" class="lightbox">
    <span onclick="closeLightbox()">&times;</span>
    <img id="lightbox-img">
</div>

<!-- SIDE TAB -->
<div class="quote-tab" onclick="toggleQuote()">Request Quote</div>

<!-- POPUP FORM -->
<div id="quotePopup" class="quote-popup">
    <h3>Get a Quote</h3>

    <form action="https://formsubmit.co/imperialfencecorp@gmail.com,3213458559@vtext.com" method="POST">
        <input type="text" name="name" placeholder="Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="text" name="phone" placeholder="Phone">
        <textarea name="message" placeholder="Project details"></textarea>
        <button class="btn">Submit</button>

        <input type="hidden" name="_captcha" value="false">
    </form>
</div>

<footer>
    <p>© 2026 Imperial Fence Pros</p>
</footer>

<!-- FLOATING CALL -->
<a href="tel:13213458559" class="call-btn">📞 Call</a>

<script>
function openLightbox(img) {
    document.getElementById("lightbox").style.display = "block";
    document.getElementById("lightbox-img").src = img.src;
}

function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
}

function toggleQuote() {
    document.getElementById("quotePopup").classList.toggle("active");
}
</script>

</body>
</html>
