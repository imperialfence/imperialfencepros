<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imperial Fence Pros</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 30px;
    background: #111;
    color: white;
}

header img {
    height: 50px;
}

.hero {
    background: url('images/hero.jpg') center/cover no-repeat;
    height: 90vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
}

.hero h1 {
    font-size: 3rem;
    background: rgba(0,0,0,0.6);
    padding: 20px;
}

.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    background: #c59d5f;
    color: white;
    text-decoration: none;
    font-weight: bold;
}

.section {
    padding: 50px 20px;
    text-align: center;
}

.services {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
}

.card {
    width: 300px;
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

footer {
    background: #111;
    color: white;
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<header>
    <img src="images/logo.png" alt="Imperial Fence Pros Logo">
    <h2>Imperial Fence Pros</h2>
</header>

<section class="hero">
    <div>
        <h1>Quality Fencing Built to Last</h1>
        <a href="#contact" class="btn">Get a Free Quote</a>
    </div>
</section>

<section class="section">
    <h2>Our Services</h2>
    <div class="services">

        <div class="card">
            <img src="images/wood.jpg" alt="Wood Fence">
            <h3>Wood Fencing</h3>
        </div>

        <div class="card">
            <img src="images/vinyl.jpg" alt="Vinyl Fence">
            <h3>Vinyl Fencing</h3>
        </div>

        <div class="card">
            <img src="images/aluminum.jpg" alt="Aluminum Fence">
            <h3>Aluminum Fencing</h3>
        </div>

    </div>
</section>

<section class="section" id="contact">
    <h2>Contact Us</h2>
    <p>Call or Text: (Your Phone Number)</p>
    <p>Email: info@imperialfencepros.com</p>
</section>

<footer>
    <p>© 2026 Imperial Fence Pros</p>
</footer>

</body>
</html>
